name: Actualizar TRM Diario

on:
  schedule:
    - cron: '30 16 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Update TRM
        run: python execution/update_cloud.py

      - name: Commit and push
        run: |
          git config user.name "TRM Bot"
          git config user.email "trm-bot@grupohada.com"
          git add trm_data.json
          git diff --cached --quiet || git commit -m "TRM actualizado $(date +'%Y-%m-%d')"
          git push
